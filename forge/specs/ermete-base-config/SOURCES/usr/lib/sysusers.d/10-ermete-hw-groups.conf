# /usr/lib/sysusers.d/10-ermete-hw-groups.conf
# Definizione statica dei gruppi vitali per Udev/KMS nell'Initramfs
g video 39 -
g render 326 -
g audio 63 -
g kvm 36 -
g input 104 -
g sgx - -
g disk 6 -
g utmp 22 -
g adm 4 -

# Demone NVIDIA Persistenced
g nvidia-persistenced - -
u nvidia-persistenced - "NVIDIA daemon" /var/run/nvidia-persistenced /sbin/nologin

# Akmods (Requirement for immutable systems to avoid sysusers mismatch)
g akmods - -
u akmods - "User for akmods" /var/cache/akmods /sbin/nologin
