<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the Ermete Updater service -->
  <policy user="root">
    <allow own="os.ermete.Updater"/>
    <allow send_destination="os.ermete.Updater"/>
  </policy>

  <!-- Allow anyone to invoke methods, but Polkit will verify authorization inside the daemon -->
  <policy context="default">
    <allow send_destination="os.ermete.Updater"/>
    <allow receive_sender="os.ermete.Updater"/>
  </policy>
</busconfig>
