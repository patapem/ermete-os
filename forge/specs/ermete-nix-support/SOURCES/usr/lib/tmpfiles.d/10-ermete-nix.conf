# tmpfiles.d configuration for Nix on OSTree (strictly inside /var)
d /var/nix 0755 root root -
d /var/nix/var 0755 root root -
d /var/nix/var/nix 0755 root root -
d /var/nix/var/nix/profiles 0755 root root -
L+ /var/nix/var/nix/profiles/default - - - - /usr/share/nix-initial-state/var/nix/profiles/default
