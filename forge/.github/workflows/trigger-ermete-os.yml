name: Trigger Downstream Ermete OS
on:
  workflow_run:
    workflows:
      - "🌋 Ermete Forge Orchestrator"
    types:
      - completed

jobs:
  trigger:
    runs-on: self-hosted
    if: ${{ contains(fromJson('["success", "failure"]'), github.event.workflow_run.conclusion) }}
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ERMETE_APP_ID }}
          private-key: ${{ secrets.ERMETE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch to Ermete OS
        run: |
          curl -f -s -S -X POST https://api.github.com/repos/${{ github.repository_owner }}/ermete/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: Bearer ${{ steps.app-token.outputs.token }}" \
          -d '{"event_type": "forge-updated"}'
