# Mako Notification Config - Minimalist / Glassmorphism
font=Inter 10
background-color={{colors.surface.default.hex}}e6
text-color={{colors.on_surface.default.hex}}
border-color={{colors.primary.default.hex}}
border-size=2
border-radius=8
padding=15
margin=10
default-timeout=5000
width=300
height=100
layer=overlay

[urgency=low]
border-color={{colors.secondary.default.hex}}

[urgency=high]
border-color={{colors.error.default.hex}}
default-timeout=0
