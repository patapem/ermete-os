[main]
font=JetBrains Mono:size=14
dpi-aware=yes
icon-theme=Papirus-Dark
terminal=foot -e
prompt="❯ "
layer=top
lines=10
width=40
horizontal-pad=20
vertical-pad=20
inner-pad=10
image-size-ratio=0.5
exit-on-keyboard-focus-loss=yes
keyboard-focus=on-demand

include=~/.config/fuzzel/colors.ini

[border]
width=2
radius=12
