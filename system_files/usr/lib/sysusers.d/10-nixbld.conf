# Sysusers per Nix (Nix Build Daemon)
# Nix necessita di un gruppo `nixbld` e di vari utenti per l'isolamento dei build
g nixbld 30000 - -
u nixbld1 30001 "Nix build user 1" /var/empty /usr/sbin/nologin
u nixbld2 30002 "Nix build user 2" /var/empty /usr/sbin/nologin
u nixbld3 30003 "Nix build user 3" /var/empty /usr/sbin/nologin
u nixbld4 30004 "Nix build user 4" /var/empty /usr/sbin/nologin
u nixbld5 30005 "Nix build user 5" /var/empty /usr/sbin/nologin
u nixbld6 30006 "Nix build user 6" /var/empty /usr/sbin/nologin
u nixbld7 30007 "Nix build user 7" /var/empty /usr/sbin/nologin
u nixbld8 30008 "Nix build user 8" /var/empty /usr/sbin/nologin
u nixbld9 30009 "Nix build user 9" /var/empty /usr/sbin/nologin
u nixbld10 30010 "Nix build user 10" /var/empty /usr/sbin/nologin

m nixbld1 nixbld
m nixbld2 nixbld
m nixbld3 nixbld
m nixbld4 nixbld
m nixbld5 nixbld
m nixbld6 nixbld
m nixbld7 nixbld
m nixbld8 nixbld
m nixbld9 nixbld
m nixbld10 nixbld
