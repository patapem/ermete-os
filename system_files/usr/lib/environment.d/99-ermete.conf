MOZ_ENABLE_WAYLAND=1
ELECTRON_OZONE_PLATFORM_HINT=wayland
# Environment Variables per abilitare Wayland Nativo nei Toolkit Grafici
QT_QPA_PLATFORM="wayland;xcb"
GDK_BACKEND="wayland,x11"
SDL_VIDEODRIVER="wayland,x11"
XCURSOR_THEME="Bibata-Modern-Classic"
XCURSOR_SIZE="24"
# Ottimizzazione NVIDIA Wayland & Hardware Video Acceleration
LIBVA_DRIVER_NAME=nvidia
__GLX_VENDOR_LIBRARY_NAME=nvidia
NVD_BACKEND=direct

# Integrazione Sicurezza SSH GUI
SSH_ASKPASS=/usr/libexec/seahorse/ssh-askpass
GTK_USE_PORTAL=1
XDG_CURRENT_DESKTOP=niri
