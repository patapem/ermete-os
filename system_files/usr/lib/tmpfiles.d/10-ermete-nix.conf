# Crea il socket holder in /run (var_run_t) in bypass a SELinux default_t
d /run/nix-daemon-socket 0755 root root - -

# Ripristina la gerarchia dello stato di Nix dalla directory base (risolve Amnesia di /var)
d /var/opt/nix 0755 root root - -
d /var/opt/nix/store 0755 root root - -
d /var/opt/nix/work 0755 root root - -
C /var/opt/nix/var - - - - /usr/share/nix-initial-state/var

# Collega il path hardcoded dai client Nix al socket in /run
L+ /var/opt/nix/var/nix/daemon-socket - - - - /run/nix-daemon-socket
