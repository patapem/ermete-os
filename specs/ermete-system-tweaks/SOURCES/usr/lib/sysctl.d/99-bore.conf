# Ermete OS: BORE (Burst-Oriented Response Enhancer) Sysctl Tuning
# Ottimizzazioni per il kernel Chimera con BORE compilato nativamente.

# Abilita lo scheduler BORE
kernel.sched_bore = 1

# Tunable per la reattività del desktop e gaming
kernel.sched_burst_penalty_scale = 1200
kernel.sched_burst_penalty_offset = 15

# Bilanciamento CFS
kernel.sched_cfs_bandwidth_slice_us = 3000
kernel.sched_latency_ns = 2000000
kernel.sched_min_granularity_ns = 300000
kernel.sched_wakeup_granularity_ns = 400000
