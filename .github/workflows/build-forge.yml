name: Ermete Forge OCI Assembly

on:
  push:
    branches: [ main ]
    paths:
      - 'specs/**'
      - 'config/**'
      - '.github/workflows/build-forge.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  REGISTRY: ghcr.io
  FEDORA_VERSION: 43

jobs:
  build-selinux:
    name: 🛡️ Build SELinux Policies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-selinux/**') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-selinux-${{ steps.hash.outputs.hash }}
      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: dnf install -y rpm-build rpmdevtools checkpolicy policycoreutils
      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          rpmdev-setuptree
          cp specs/ermete-selinux/SOURCES/* ~/rpmbuild/SOURCES/
          rpmbuild -ba specs/ermete-selinux/ermete-selinux.spec
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/rpmbuild/RPMS/*/*.rpm / || true
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-selinux:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER

  build-nvidia:
    name: 🎮 Build NVIDIA KMOD
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Setup Repos and get Kernel Version
        id: kernel
        run: |
          curl -Lo /etc/yum.repos.d/fedora-nvidia.repo https://negativo17.org/repos/fedora-nvidia.repo
          curl -Lo /etc/yum.repos.d/bieszczaders-kernel-cachyos.repo https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos/repo/fedora-${{ env.FEDORA_VERSION }}/bieszczaders-kernel-cachyos-fedora-${{ env.FEDORA_VERSION }}.repo
          dnf install -y kernel-cachyos kernel-cachyos-devel-matched
          echo "kernel_ver=$(rpm -q --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' kernel-cachyos | sort -V | tail -n 1)" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /var/cache/akmods/nvidia/
          key: rpm-nvidia-${{ steps.kernel.outputs.kernel_ver }}
      - name: Install Dependencies and Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y akmods akmod-nvidia gcc gcc-c++ make elfutils-libelf-devel openssl-devel rpm-build rpmdevtools
          akmods --force --kernels "${{ steps.kernel.outputs.kernel_ver }}" || true
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /var/cache/akmods/nvidia/*.rpm / || true
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-nvidia:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER

  build-ags:
    name: 🖥️ Build AGS (Astal Extreme)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Astal RPMs from COPR
        run: |
          dnf install -y dnf-plugins-core
          dnf copr enable -y solopasha/hyprland
          mkdir -p /github/home/RPMS
          cd /github/home/RPMS
          PACKAGES=$(dnf repoquery --repo=copr:copr.fedorainfracloud.org:solopasha:hyprland -q --arch=x86_64,noarch | grep -E '^astal|^aylurs-gtk-shell2|^appmenu' | grep -v 'debug' | grep -v '\.src$')
          dnf download $PACKAGES
          echo "Downloaded packages:"
          ls -lh
      - name: Fetch standalone dart-sass
        run: |
          mkdir -p /github/home/BIN
          cd /github/home/BIN
          curl -sL https://github.com/sass/dart-sass/releases/download/1.101.0/dart-sass-1.101.0-linux-x64.tar.gz -o dart-sass.tar.gz
          tar -xzf dart-sass.tar.gz
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/RPMS/*.rpm / || true
          buildah copy $ctr /github/home/BIN/dart-sass/sass /dart-sass || true
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-ags:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER

  build-starship:
    name: 🚀 Build Starship
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-starship/**', 'config/rpmmacros') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-starship-${{ steps.hash.outputs.hash }}
      - name: Cache Cargo Registry
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /root/.cargo/registry
          key: cargo-registry-starship-${{ steps.hash.outputs.hash }}
          restore-keys: cargo-registry-starship-
      - name: Install Dependencies and Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y rpm-build rpmdevtools gcc gcc-c++ cargo rust cmake mold tar xz curl pkgconf-pkg-config zlib-devel openssl-devel
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          spectool -g -R specs/ermete-starship/ermete-starship.spec
          dnf builddep -y specs/ermete-starship/ermete-starship.spec || true
          rpmbuild -ba specs/ermete-starship/ermete-starship.spec
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/rpmbuild/RPMS/*/*.rpm / || true
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-starship:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER

  build-matugen:
