name: Ermete Forge OCI Assembly

on:
  push:
    branches: [ main ]
    paths:
      - 'specs/**'
      - 'config/**'
      - '.github/workflows/build-forge.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ermete-forge
  FEDORA_VERSION: 43

jobs:
  build-selinux:
    name: 🛡️ Build SELinux Policies
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:43
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-selinux/**') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-selinux-${{ steps.hash.outputs.hash }}
      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: dnf install -y rpm-build rpmdevtools checkpolicy policycoreutils
      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          rpmdev-setuptree
          cp specs/ermete-selinux/SOURCES/* ~/rpmbuild/SOURCES/
          rpmbuild -ba specs/ermete-selinux/ermete-selinux.spec
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-selinux
          path: /github/home/rpmbuild/RPMS/*/*.rpm

  build-nvidia:
    name: 🎮 Build NVIDIA KMOD
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Setup Repos and get Kernel Version
        id: kernel
        run: |
          curl -Lo /etc/yum.repos.d/fedora-nvidia.repo https://negativo17.org/repos/fedora-nvidia.repo
          curl -Lo /etc/yum.repos.d/bieszczaders-kernel-cachyos.repo https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos/repo/fedora-${{ env.FEDORA_VERSION }}/bieszczaders-kernel-cachyos-fedora-${{ env.FEDORA_VERSION }}.repo
          dnf install -y kernel-cachyos kernel-cachyos-devel-matched
          echo "kernel_ver=$(rpm -q --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' kernel-cachyos | sort -V | tail -n 1)" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /var/cache/akmods/nvidia/
          key: rpm-nvidia-${{ steps.kernel.outputs.kernel_ver }}
      - name: Install Dependencies and Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y akmods akmod-nvidia gcc gcc-c++ make elfutils-libelf-devel openssl-devel rpm-build rpmdevtools
          akmods --force --kernels "${{ steps.kernel.outputs.kernel_ver }}" || true
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-nvidia
          path: /var/cache/akmods/nvidia/*.rpm

  build-ags:
    name: 🖥️ Build AGS (Gentoo/ClearLinux Extreme)
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:41
    steps:
      - uses: actions/checkout@v4
      - name: Prepare DNF and Check Upstream Version
        id: upstream
        run: |
          dnf install -y dnf-plugins-core
          dnf copr enable -y aylur/ags
          echo "ags_ver=$(dnf info aylurs-gtk-shell | grep Version | head -n 1 | awk '{print $3}')" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-ags-${{ steps.upstream.outputs.ags_ver }}-${{ hashFiles('config/rpmmacros') }}
      - name: Install Dependencies and Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y rpm-build rpmdevtools clang mimalloc-devel
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          dnf download --source aylurs-gtk-shell
          dnf builddep -y aylurs-gtk-shell-*.src.rpm
          export CC=clang
          export CXX=clang++
          export CFLAGS="$CFLAGS -mllvm -polly -mllvm -polly-position=early"
          export CXXFLAGS="$CXXFLAGS -mllvm -polly -mllvm -polly-position=early"
          export LDFLAGS="$LDFLAGS -lmimalloc"
          rpmbuild --rebuild aylurs-gtk-shell-*.src.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-ags
          path: /github/home/rpmbuild/RPMS/*/*.rpm

  build-rust:
    name: 🦀 Build Rust Tools & Assets
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:43
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-starship/**', 'specs/ermete-matugen/**', 'specs/ermete-bibata/**', 'config/rpmmacros') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-rust-${{ steps.hash.outputs.hash }}
      - name: Cache Cargo Registry
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /root/.cargo/registry
          key: cargo-registry-${{ steps.hash.outputs.hash }}
          restore-keys: cargo-registry-
      - name: Install Dependencies and Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y rpm-build rpmdevtools gcc gcc-c++ cargo rust cmake mold tar xz curl pkgconf-pkg-config zlib-devel openssl-devel
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          for spec in specs/ermete-starship/ermete-starship.spec \
                      specs/ermete-matugen/ermete-matugen.spec \
                      specs/ermete-bibata/ermete-bibata.spec; do
            spectool -g -R $spec
            dnf builddep -y $spec || true
            rpmbuild -ba $spec
          done
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-rust
          path: /github/home/rpmbuild/RPMS/*/*.rpm

  publish-oci:
    name: 📦 Publish OCI-as-a-Repo
    needs: [build-selinux, build-nvidia, build-ags, build-rust]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          path: rpms/
          merge-multiple: true
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push OCI Scratch Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
