name: Ermete System Components

on:
  push:
    branches: [ main ]
    paths:
      - 'specs/ermete-ags-config/**'
      - 'specs/ermete-niri-session/**'
      - 'specs/ermete-ide-bootstrap/**'
      - 'specs/ermete-system-services/**'
      - 'specs/ermete-nix-support/**'
      - 'specs/ermete-system-config/**'
      - 'specs/ermete-system-tweaks/**'
      - '.github/workflows/build-system-components.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-ags-config:
    name: ⚙️ Build AGS Config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
    steps:
      - uses: actions/checkout@v4
      - name: Build RPM
        run: |
          dnf install -y rpm-build rpmdevtools
          rpmdev-setuptree
          rpmbuild -bb --nocheck specs/ermete-ags-config/ermete-ags-config.spec
      - name: Publish OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/rpmbuild/RPMS/*/*.rpm /
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-ags-config:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE && buildah push $IMAGE

