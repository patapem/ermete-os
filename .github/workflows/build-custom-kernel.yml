name: Ermete Forge OCI Kernel Assembly

on:
  push:
    branches: [ main ]
    paths:
      - 'specs/ermete-kernel/**'
      - '.github/workflows/build-custom-kernel.yml'
      - '!**/*.md'
      - '!**/*.txt'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FEDORA_VERSION: 43

jobs:
  build-kernel:
    name: 🧠 Build Chimera Kernel (CachyOS + Clear + Gentoo)
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged --security-opt label=disable
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Compiler Objects (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: kernel-ccache-${{ github.sha }}
          restore-keys: |
            kernel-ccache-

      - name: Install Build Dependencies
        run: |
          echo "zchunk=False" >> /etc/dnf/dnf.conf
          echo "fastestmirror=True" >> /etc/dnf/dnf.conf
          echo "install_weak_deps=False" >> /etc/dnf/dnf.conf
          dnf clean all
          dnf install -y rpm-build rpmdevtools gcc gcc-c++ make cmake flex bison ncurses-devel elfutils-libelf-devel openssl-devel bc rsync tar wget curl cpio perl zstd git llvm clang lld ccache qemu-kvm stress-ng iperf3

      - name: Fetch Base Kernel and Patches
        run: |
          bash specs/ermete-kernel/prepare-chimera.sh

      - name: Bedrock Idempotency Check
        id: idempotency
        run: |
          dnf install -y skopeo
          # Calcolo l'hash dell'intero albero sorgente, garantendo idempotenza matematica perfetta
          FINGERPRINT=$(find ~/rpmbuild/SPECS ~/rpmbuild/SOURCES -type f -exec sha256sum {} + | sort | sha256sum | awk '{print $1}')
          echo "FINGERPRINT=$FINGERPRINT" >> $GITHUB_ENV
          
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/ermete-kernel:$FINGERPRINT"
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          
          echo "Verifico se il kernel con fingerprint $FINGERPRINT esiste già..."
          if skopeo inspect --creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} docker://$IMAGE_LOWER > /dev/null 2>&1; then
            echo "Il Kernel è identico a una build esistente. Salto la compilazione!"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Nuovo fingerprint rilevato. Procedo alla compilazione."
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Fase 1 - Build PGO Strumentata (Sensori GCOV)
        if: steps.idempotency.outputs.skip_build != 'true'
        run: |
          echo "Iniezione sensori GCOV per profilazione empirica..."
          echo "CONFIG_GCOV_KERNEL=y" >> ~/rpmbuild/SOURCES/kernel-x86_64.config
          echo "CONFIG_GCOV_PROFILE_ALL=y" >> ~/rpmbuild/SOURCES/kernel-x86_64.config
          
          export PATH="/usr/lib64/ccache:/usr/lib/ccache:$PATH"
          export CCACHE_DIR=~/.cache/ccache
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=10G
          mkdir -p ~/.cache/ccache
          ccache -z
          
          spectool -g -R ~/rpmbuild/SPECS/kernel.spec
          dnf builddep -y ~/rpmbuild/SPECS/kernel.spec
          rpmbuild -bb ~/rpmbuild/SPECS/kernel.spec --target x86_64
          ccache -s

      - name: Fase 2 - Stress Test Agnostico QEMU (Estrazione Termica)
        if: steps.idempotency.outputs.skip_build != 'true'
        run: |
          echo "Estrazione del kernel strumentato..."
          mkdir -p /tmp/pgo_kernel
          cd /tmp/pgo_kernel
          rpm2cpio ~/rpmbuild/RPMS/x86_64/kernel-core-*.rpm | cpio -idmv
          KERNEL_IMAGE=$(ls boot/vmlinuz-* | head -n 1)
          
          echo "Creazione demone di Init per lo stress test estremo..."
          cat << 'EOF' > /init
          #!/bin/bash
          export PATH=/usr/bin:/usr/sbin:/bin:/sbin
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t debugfs none /sys/kernel/debug
          
          echo "Inizio STRESS TERMICO (CPU, VFS, Scheduler)..."
          stress-ng --cpu 4 --io 4 --vm 2 --vm-bytes 1G --timeout 30s
          
          echo "Inizio STRESS RETE (TCP/IP)..."
          iperf3 -s & IPERF_PID=$!
          sleep 2
          iperf3 -c 127.0.0.1 -t 10
          kill $IPERF_PID
          
          echo "Estrazione dati GCOV empirici verso l'host..."
          mkdir -p /mnt/host_gcov
          mount -t 9p -o trans=virtio,version=9p2000.L host_gcov /mnt/host_gcov
          cp -a /sys/kernel/debug/gcov/* /mnt/host_gcov/ || true
          sync
          
          echo "Spegnimento QEMU..."
          poweroff -f
          EOF
          chmod +x /init
          
          mkdir -p /tmp/host_gcov
          
          echo "Avvio virtualizzazione isolata 9pfs..."
          # Usiamo il container stesso (/) come rootfs in QEMU tramite 9pfs
          qemu-system-x86_64 -kernel $KERNEL_IMAGE \
            -append "root=host_root rootfstype=9p rootflags=trans=virtio,version=9p2000.L rw init=/init console=ttyS0" \
            -fsdev local,security_model=none,id=fsdev-root,path=/ \
            -device virtio-9p-pci,id=fs-root,fsdev=fsdev-root,mount_tag=host_root \
            -fsdev local,security_model=none,id=fsdev-gcov,path=/tmp/host_gcov \
            -device virtio-9p-pci,id=fs-gcov,fsdev=fsdev-gcov,mount_tag=host_gcov \
            -m 4G -smp 4 -nographic -no-reboot

      - name: Fase 3 - Build PGO Cristallizzata (Performance Assoluta)
        if: steps.idempotency.outputs.skip_build != 'true'
        run: |
          echo "Rimozione sensori GCOV (Cristallizzazione)..."
          sed -i '/CONFIG_GCOV/d' ~/rpmbuild/SOURCES/kernel-x86_64.config
          
          echo "Iniezione mappa termica nel compilatore GCC..."
          # Aggiungiamo i flag PGO preservando le macro Holy Grail
          cat << 'EOF' >> ~/.rpmmacros
          %optflags %{__global_compiler_flags} -march=x86-64-v3 -pipe -Wno-error -fprofile-use=/tmp/host_gcov -Wno-missing-profile
          %kcflags -march=x86-64-v3 -pipe -Wno-error -fprofile-use=/tmp/host_gcov -Wno-missing-profile
          %_without_selftests 1
          %_without_tools 1
          %_without_perf 1
          %_without_libperf 1
          %_without_ynl 1
          %_without_bpftool 1
          %_without_debug 1
          %_without_debuginfo 1
          %_without_doc 1
          %_binary_payload w1.zstdio
          %_source_payload w1.zstdio
          EOF
          
          echo "Pulizia build precedente..."
          rm -rf ~/rpmbuild/BUILD/* ~/rpmbuild/RPMS/*
          
          echo "Compilazione del Kernel Ottimizzato (Cristallizzazione)..."
          export PATH="/usr/lib64/ccache:/usr/lib/ccache:$PATH"
          export CCACHE_DIR=~/.cache/ccache
          rpmbuild -bb ~/rpmbuild/SPECS/kernel.spec --target x86_64
          ccache -s
          
      - name: Publish Micro-Container OCI
        if: steps.idempotency.outputs.skip_build != 'true'
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr ~/rpmbuild/RPMS/*/*.rpm /
          
          IMAGE_LATEST=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/ermete-kernel:latest" | tr '[:upper:]' '[:lower:]')
          IMAGE_FINGERPRINT=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/ermete-kernel:${{ env.FINGERPRINT }}" | tr '[:upper:]' '[:lower:]')
          
          buildah commit $ctr $IMAGE_LATEST
          buildah tag $IMAGE_LATEST $IMAGE_FINGERPRINT
          
          buildah push $IMAGE_LATEST
          buildah push $IMAGE_FINGERPRINT
