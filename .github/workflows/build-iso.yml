name: Build ISO (Manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag dell''immagine OCI da usare (es. latest, o una data specifica)'
        required: true
        default: 'latest'

jobs:
  build-iso:
    name: Build ISO Installer
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Costruzione ISO tramite bootc-image-builder
        run: |
          mkdir -p ./output
          # Lanciamo il builder ufficiale di CentOS/RedHat per bootc
          # Necessita di essere unprivileged, ma con la directory output bindata
          sudo podman run \
            --rm \
            --privileged \
            --security-opt label=type:unconfined_t \
            -v ./output:/output \
            -v ./disk_config/iso.toml:/config.toml:ro \
            quay.io/centos-bootc/bootc-image-builder:latest \
            build \
            --type anaconda-iso \
            --config /config.toml \
            ghcr.io/${{ github.repository_owner }}/ermete-os:${{ github.event.inputs.image_tag }}
            
      - name: Rinominazione e Hashing
        run: |
          cd ./output/bootiso/
          mv install.iso Ermete-OS-${{ github.event.inputs.image_tag }}.iso
          sha256sum Ermete-OS-${{ github.event.inputs.image_tag }}.iso > Ermete-OS-${{ github.event.inputs.image_tag }}.iso.sha256
          
      - name: Pubblicazione su GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: Ermete OS ISO - ${{ github.event.inputs.image_tag }}
          tag_name: iso-${{ github.event.inputs.image_tag }}-${{ github.run_id }}
          files: |
            ./output/bootiso/*.iso
            ./output/bootiso/*.sha256
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
