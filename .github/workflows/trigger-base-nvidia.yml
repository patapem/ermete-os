name: Trigger Downstream Base NVIDIA
on:
  workflow_run:
    workflows:
      - "Ermete Forge OCI Kernel Assembly"
      - "Ermete Custom Hardware"
      - "Ermete Custom Core"
      - "Ermete Custom CLI"
    types:
      - completed

jobs:
  trigger:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Dispatch to Base NVIDIA
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository_owner }}/ermete-base-nvidia/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
          -d '{"event_type": "forge-updated"}'
