name: Ermete Custom Core

on:
  push:
    branches: [ main ]
    paths:
      - 'specs/ermete-selinux/**'
      - 'specs/ermete-ananicy/**'
      - 'specs/ermete-base-config/**'
      - '.github/workflows/build-custom-core.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  REGISTRY: ghcr.io
  FEDORA_VERSION: 43

jobs:
  build-selinux:
    name: 🛡️ Build SELinux Policies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-selinux/**') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-selinux-${{ steps.hash.outputs.hash }}
      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: dnf install -y rpm-build rpmdevtools checkpolicy policycoreutils
      - name: Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          rpmdev-setuptree
          cp specs/ermete-selinux/SOURCES/* ~/rpmbuild/SOURCES/
          rpmbuild -bb --nocheck specs/ermete-selinux/ermete-selinux.spec
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/rpmbuild/RPMS/*/*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-selinux:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER
  build-ananicy:
    name: ⚡ Build Ananicy CPP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-ananicy/**', 'config/rpmmacros') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/RPMS/
          key: rpm-ananicy-${{ steps.hash.outputs.hash }}
      - name: Install Dependencies and Build Ananicy
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y rpm-build rpmdevtools cmake gcc-c++ spdlog-devel systemd-devel nlohmann-json-devel fmt-devel
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          
          spectool -g -R specs/ermete-ananicy/ananicy-cpp.spec
          dnf builddep -y specs/ermete-ananicy/ananicy-cpp.spec
          rpmbuild -bb --nocheck specs/ermete-ananicy/ananicy-cpp.spec
          
          mkdir -p /github/home/RPMS
          cp ~/rpmbuild/RPMS/*/*.rpm /github/home/RPMS/
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/RPMS/*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-ananicy:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER
  build-base-config:
    name: 🏗️ Build Base Config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
    steps:
      - uses: actions/checkout@v4
      - name: Build RPM
        run: |
          dnf install -y rpm-build rpmdevtools
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp -r specs/ermete-base-config/SOURCES/* ~/rpmbuild/SOURCES/
          cp specs/ermete-base-config/ermete-base-config.spec ~/rpmbuild/SPECS/
          rpmbuild -ba ~/rpmbuild/SPECS/ermete-base-config.spec
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
          ctr=$(buildah from scratch)
          buildah copy $ctr ~/rpmbuild/RPMS/noarch/*.rpm /
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository_owner }}/ermete-forge-base-config:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER
