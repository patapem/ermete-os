name: Template Upstream Rebuild

on:
  workflow_call:
    inputs:
      package_list_file:
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  FEDORA_VERSION: 43

jobs:
  prepare-matrix:
    name: 📋 Parse Packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate Matrix JSON
        id: set-matrix
        run: |
          # Legge il file ignorando le righe vuote e i commenti, convertendolo in array JSON
          PKGS=$(grep -v '^\s*#' ${{ inputs.package_list_file }} | grep -v '^\s*$' | jq -R -s -c 'split("\n")[:-1]')
          echo "packages=$PKGS" >> $GITHUB_OUTPUT

  build-rolling:
    needs: prepare-matrix
    name: 🔄 Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare-matrix.outputs.packages) }}
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('config/rpmmacros') }}" >> $GITHUB_OUTPUT
        
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-rolling-${{ matrix.package }}-${{ steps.hash.outputs.hash }}-${{ github.run_id }}
          restore-keys: |
            rpm-rolling-${{ matrix.package }}-${{ steps.hash.outputs.hash }}-
            rpm-rolling-${{ matrix.package }}-
            
      - name: Fetch, Patch and Build ${{ matrix.package }}
        run: |
          dnf install -y rpm-build dnf-plugins-core rpmdevtools
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          cd ~/rpmbuild/SRPMS
          
          echo "--- Downloading Source RPM per ${{ matrix.package }} ---"
          dnf download --source ${{ matrix.package }}
          
          echo "--- Installazione dipendenze di build (DNF5 Bugfix) ---"
          rpm -ivh *.src.rpm || true
          dnf builddep -y ~/rpmbuild/SPECS/*.spec
          
          echo "--- Bedrock Hack: Ripristino README.md mancanti per le dipendenze Rust ---"
          find /usr/share/cargo/registry/ -maxdepth 1 -mindepth 1 -type d -exec touch {}/README.md \; || true
          
          echo "--- Bedrock Hack: Rimozione --locked per compatibilità RPM Rust ---"
          sed -i 's/--locked//g' /usr/lib/rpm/macros.d/macros.cargo || true
          
          echo "--- Applicazione Quirks Specifici ---"
          bash $GITHUB_WORKSPACE/config/apply-quirks.sh "${{ matrix.package }}"
          
          echo "--- Ricompilazione estrema con macro Ermete ---"
          if ! rpmbuild --rebuild *.src.rpm; then
            if ls ~/rpmbuild/SRPMS/*.buildreqs.nosrc.rpm >/dev/null 2>&1; then
              echo "--- Installazione Dipendenze Dinamiche (%generate_buildrequires) ---"
              dnf install -y ~/rpmbuild/SRPMS/*.buildreqs.nosrc.rpm
              echo "--- Secondo tentativo di Ricompilazione Estrema ---"
              rpmbuild --rebuild *.src.rpm
            else
              exit 1
            fi
          fi
          
          mkdir -p /github/home/RPMS
          cp ~/rpmbuild/RPMS/*/*.rpm /github/home/RPMS/
          
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/RPMS/*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-upstream-${{ matrix.package }}:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER
