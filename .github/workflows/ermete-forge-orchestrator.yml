name: 🌋 Ermete Forge Orchestrator

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

env:
  REGISTRY: ghcr.io
  FEDORA_VERSION: 43

jobs:
  build-builder:
    name: 🏗️ Build Base Builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Check Idempotency (Content Hash)
        id: check_idempotency
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/check_idempotency.sh --package builder --registry ghcr.io --owner ${{ github.repository_owner }} --image-name ermete-builder > idemp.out
          source ./idemp.out
          if [ "$CACHE_HIT" = "true" ]; then
            echo "cache_hit=true" >> $GITHUB_OUTPUT
          else
            echo "cache_hit=false" >> $GITHUB_OUTPUT
          fi
          echo "content_hash=$CONTENT_HASH" >> $GITHUB_OUTPUT

      - name: Build and Publish Builder
        if: steps.check_idempotency.outputs.cache_hit != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository_owner }}/ermete-builder" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_LOWER:latest -f builder/Containerfile builder/
          docker tag $IMAGE_LOWER:latest $IMAGE_LOWER:${{ steps.check_idempotency.outputs.content_hash }}
          docker push $IMAGE_LOWER:latest
          docker push $IMAGE_LOWER:${{ steps.check_idempotency.outputs.content_hash }}

  custom-packages:
    needs: build-builder
    name: 📦 Custom Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [starship, bat, selinux, ananicy, base-config, ags-config, niri-session, ide-bootstrap, system-services, nix-support, system-config, system-tweaks, matugen, bibata]
    permissions:
      contents: read
      packages: write
    container:
      image: ghcr.io/${{ github.repository_owner }}/ermete-builder:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles(format('specs/ermete-{0}/**', matrix.package), 'config/rpmmacros') }}" >> $GITHUB_OUTPUT
      - name: Check Idempotency
        id: check
        run: |
          dnf install -y skopeo
          IMAGE="docker://${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-${{ matrix.package }}:${{ steps.hash.outputs.hash }}"
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          if skopeo inspect "$IMAGE_LOWER" >/dev/null 2>&1; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Install Dependencies and Build
        if: steps.check.outputs.skip != 'true'
        run: |
          sed -i "/tsflags=nodocs/d" /etc/dnf/dnf.conf
          dnf install -y rpm-build rpmdevtools gcc gcc-c++ cargo rust cmake mold tar xz curl pkgconf-pkg-config zlib-devel openssl-devel checkpolicy policycoreutils spdlog-devel systemd-devel nlohmann-json-devel fmt-devel which autoconf automake libtool cargo-rpm-macros
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          
          if [ -d "specs/ermete-${{ matrix.package }}/SOURCES" ]; then 
            cp -a specs/ermete-${{ matrix.package }}/SOURCES/* ~/rpmbuild/SOURCES/ || true
          fi
          
          dnf builddep -y specs/ermete-${{ matrix.package }}/*.spec || true
          spectool -g -R specs/ermete-${{ matrix.package }}/*.spec || true
          
          # First attempt (generates buildreqs.nosrc.rpm for Rust packages)
          rpmbuild -bb --nocheck specs/ermete-${{ matrix.package }}/*.spec || true
          
          # Install dynamic dependencies if generated
          if ls ~/rpmbuild/SRPMS/*.nosrc.rpm 1> /dev/null 2>&1; then
              dnf builddep -y ~/rpmbuild/SRPMS/*.nosrc.rpm || true
          fi
          
          # Workaround for Fedora 43 rust-sysinfo bug
          if ls /usr/share/cargo/registry/sysinfo-*/src/lib.rs 1> /dev/null 2>&1; then
              for sysinfo_dir in /usr/share/cargo/registry/sysinfo-*/; do
                  touch "$sysinfo_dir/README.md"
              done
          fi
          
          # Second attempt (actual build)
          rpmbuild -bb --nocheck specs/ermete-${{ matrix.package }}/*.spec
          
          mkdir -p /github/home/RPMS
          cp ~/rpmbuild/RPMS/*/*.rpm /github/home/RPMS/
      - name: Publish Micro-Container OCI
        if: steps.check.outputs.skip != 'true'
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/RPMS/*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-${{ matrix.package }}" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER:latest
          buildah tag $IMAGE_LOWER:latest $IMAGE_LOWER:${{ steps.hash.outputs.hash }}
          buildah push $IMAGE_LOWER:latest
          buildah push $IMAGE_LOWER:${{ steps.hash.outputs.hash }}

  ags-ecosystem:
    needs: build-builder
    name: 🖥️ Build AGS Ecosystem
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: ghcr.io/${{ github.repository_owner }}/ermete-builder:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Build and Publish AGS Components
        run: |
          sed -i "/tsflags=nodocs/d" /etc/dnf/dnf.conf
          dnf install -y rpm-build rpmdevtools meson ninja-build gcc gcc-c++ vala pkgconf-pkg-config buildah skopeo which autoconf automake libtool
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          
          for pkg in appmenu-glib-translator astal-io astal astal-libs astal-gjs astal-gtk4 astal-lua aylurs-gtk-shell2 hyprpanel; do
            echo "========================================"
            echo "Building $pkg..."
            echo "========================================"
            
            # Compute Hash
            hash=$(sha256sum specs/ermete-astal/$pkg/*.spec config/rpmmacros | sha256sum | awk '{print $1}')
            IMAGE="docker://${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-$pkg:$hash"
            IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
            
            if skopeo inspect "$IMAGE_LOWER" >/dev/null 2>&1; then
              echo "Immagine trovata per $pkg, skip. Estraggo RPM dall'immagine per dipendenze downstream."
              IMAGE_PULL=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-$pkg:$hash" | tr '[:upper:]' '[:lower:]')
              ctr=$(buildah from "$IMAGE_PULL")
              mnt=$(buildah mount $ctr)
              dnf install -y $mnt/*.rpm || true
              buildah umount $ctr
              buildah rm $ctr
            else
              dnf builddep -y specs/ermete-astal/$pkg/*.spec || true
              spectool -g -R specs/ermete-astal/$pkg/*.spec || true
              rpmbuild -bb --nocheck specs/ermete-astal/$pkg/*.spec
              
              # Installa nel sistema locale per i pacchetti successivi!
              dnf install -y ~/rpmbuild/RPMS/*/*.rpm
              
              # Publish
              ctr=$(buildah from scratch)
              buildah copy $ctr ~/rpmbuild/RPMS/*/*.rpm /
              IMAGE_LOWER_LATEST=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-$pkg" | tr '[:upper:]' '[:lower:]')
              buildah commit $ctr $IMAGE_LOWER_LATEST:latest
              buildah tag $IMAGE_LOWER_LATEST:latest $IMAGE_LOWER_LATEST:$hash
              buildah push $IMAGE_LOWER_LATEST:latest
              buildah push $IMAGE_LOWER_LATEST:$hash
              
              # Pulizia RPMS per il prossimo
              rm -rf ~/rpmbuild/RPMS/*
            fi
          done

  cachyos-addons:
    needs: build-builder
    name: ⚙️ Build CachyOS Addons
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [bore-sysctl, scx-scheds, scx-tools]
    permissions:
      contents: read
      packages: write
    container:
      image: ghcr.io/${{ github.repository_owner }}/ermete-builder:latest
      options: --privileged
    steps:
      - name: Fetch and Package
        run: |
          dnf install -y dnf5 curl buildah
          curl -Lo /etc/yum.repos.d/bieszczaders.repo "https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos-addons/repo/fedora-43/bieszczaders-kernel-cachyos-addons-fedora-43.repo"
          mkdir -p /github/home/RPMS
          dnf5 download -y --destdir=/github/home/RPMS ${{ matrix.package }}
          rm -f /github/home/RPMS/*.src.rpm
          
          export STORAGE_DRIVER=vfs BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/RPMS/*.rpm /
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-${{ matrix.package }}:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE && buildah push $IMAGE

  build-kernel:
    needs: build-builder
    name: 🧠 Build Chimera Kernel (CachyOS + Clear + Gentoo)
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    container:
      image: ghcr.io/${{ github.repository_owner }}/ermete-builder:latest
      options: --privileged --security-opt label=disable
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Build Dependencies
        run: |
          echo "zchunk=False" >> /etc/dnf/dnf.conf
          echo "fastestmirror=True" >> /etc/dnf/dnf.conf
          echo "install_weak_deps=False" >> /etc/dnf/dnf.conf
          dnf clean all
          sed -i "/tsflags=nodocs/d" /etc/dnf/dnf.conf
          dnf install -y rpm-build rpmdevtools gcc gcc-c++ make cmake flex bison ncurses-devel elfutils-libelf-devel openssl-devel bc rsync tar wget curl cpio perl zstd git llvm clang lld ccache qemu-kvm stress-ng iperf3 jq gnupg2 hostname elfutils-devel dwarves openssl which autoconf automake libtool

      - name: Fetch Base Kernel and Patches
        run: |
          bash specs/ermete-kernel/prepare-chimera.sh

      - name: Bedrock Idempotency Check
        id: idempotency
        run: |
          dnf install -y skopeo
          FINGERPRINT=$(find ~/rpmbuild/BUILD/ -type f \( -name '*.patch' -o -name '.kernel_version' \) -exec sha256sum {} + | sort | sha256sum | awk '{print $1}' || echo "new_build")
          echo "FINGERPRINT=$FINGERPRINT" >> $GITHUB_ENV
          
          IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-kernel:$FINGERPRINT"
          IMAGE_LOWER=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          
          echo "Verifico se il kernel con fingerprint $FINGERPRINT esiste già..."
          if skopeo inspect --creds ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} docker://$IMAGE_LOWER > /dev/null 2>&1; then
            echo "Il Kernel è identico a una build esistente. Salto la compilazione!"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Nuovo fingerprint rilevato. Procedo alla compilazione."
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Cache Compiler Objects (ccache)
        if: steps.idempotency.outputs.skip_build != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: kernel-ccache-${{ github.sha }}
          restore-keys: |
            kernel-ccache-

      - name: Fase 1 - Build PGO Strumentata (Sensori GCOV)
        if: steps.idempotency.outputs.skip_build != 'true'
        run: |
          echo "Iniezione sensori GCOV per profilazione empirica..."
          cd ~/rpmbuild/BUILD/$(cat ~/rpmbuild/BUILD/.kernel_version)
          
          ./scripts/config --enable GCOV_KERNEL
          ./scripts/config --enable GCOV_PROFILE_ALL
          make olddefconfig
          
          export PATH="/usr/lib64/ccache:/usr/lib/ccache:$PATH"
          export CCACHE_DIR=~/.cache/ccache
          export CCACHE_COMPRESS=1
          export CCACHE_MAXSIZE=10G
          mkdir -p ~/.cache/ccache
          ccache -z
          echo "Avvio compilazione micro-kernel (bzImage) per profilazione..."
          make -j$(nproc) bzImage
          ccache -s

      - name: Fase 2 - Stress Test Agnostico QEMU (Estrazione Termica)
        if: steps.idempotency.outputs.skip_build != 'true'
        run: |
          echo "Estrazione del kernel strumentato..."
          KERNEL_DIR=~/rpmbuild/BUILD/$(cat ~/rpmbuild/BUILD/.kernel_version)
          KERNEL_IMAGE="$KERNEL_DIR/arch/x86/boot/bzImage"
          
          echo "Creazione demone di Init per lo stress test estremo (Dynamic Discovery)..."
          cat << 'INITSCRIPT' > /init
          #!/bin/bash
          export PATH=/usr/bin:/usr/sbin:/bin:/sbin
          mount -t proc none /proc
          mount -t sysfs none /sys
          mount -t debugfs none /sys/kernel/debug
          
          # Dynamic Discovery of QEMU internal resources
          CORES=$(nproc)
          echo "Risorse rilevate in QEMU: $CORES Cores"
          
          echo "Inizio STRESS TERMICO (CPU, VFS, Scheduler, Mutex, Memoria)..."
          stress-ng --cpu $CORES --io $CORES --vm 2 --vm-bytes 1G --matrix $CORES --sched $CORES --mutex $CORES --timeout 60s
          
          echo "Inizio STRESS RETE (TCP/IP BBR + FQ)..."
          iperf3 -s & IPERF_PID=$!
          sleep 2
          iperf3 -c 127.0.0.1 -t 15 -P $CORES
          kill $IPERF_PID || true
          
          echo "Inizio STRESS SVILUPPO (VFS, Fork, Page Faults)..."
          cat << 'CCODE' > /tmp/test.c
          #include <stdio.h>
          int main() { return 0; }
          CCODE
          for i in $(seq 1 100); do gcc -O2 /tmp/test.c -o /tmp/test; done
          
          echo "Estrazione dati GCOV empirici verso l'host..."
          mkdir -p /mnt/host_gcov
          mount -t 9p -o trans=virtio,version=9p2000.L host_gcov /mnt/host_gcov
          cp -a /sys/kernel/debug/gcov/* /mnt/host_gcov/ || true
          sync
          
          echo "Spegnimento QEMU..."
          poweroff -f
          INITSCRIPT
          chmod +x /init
          
          mkdir -p /tmp/host_gcov
          
          # Dynamic Host Resource Allocation for QEMU
          HOST_CORES=$(nproc)
          HOST_RAM=$(awk '/MemTotal/ {print int($2/1024/1024/2)}' /proc/meminfo)
          if [ "$HOST_RAM" -lt 4 ]; then HOST_RAM=4; fi
          
          echo "Avvio virtualizzazione isolata 9pfs con $HOST_CORES Cores e ${HOST_RAM}G RAM..."
          qemu-system-x86_64 -kernel $KERNEL_IMAGE \
            -append "root=host_root rootfstype=9p rootflags=trans=virtio,version=9p2000.L rw init=/init console=ttyS0" \
            -virtfs local,path=/,mount_tag=host_root,security_model=none \
            -virtfs local,path=/tmp/host_gcov,mount_tag=host_gcov,security_model=none \
            -m ${HOST_RAM}G -smp $HOST_CORES -nographic -no-reboot

      - name: Fase 3 - Build PGO Cristallizzata (Performance Assoluta)
        if: steps.idempotency.outputs.skip_build != 'true'
        run: |
          echo "Iniezione mappa termica PGO nelle macros RPM..."
          cat << 'MACRO' >> ~/.rpmmacros
          %optflags %{__global_compiler_flags} -march=x86-64-v3 -pipe -Wno-error -fprofile-use=/tmp/host_gcov -fprofile-correction -Wno-missing-profile -fgraphite-identity -floop-nest-optimize
          %kcflags -march=x86-64-v3 -pipe -Wno-error -fprofile-use=/tmp/host_gcov -fprofile-correction -Wno-missing-profile -fgraphite-identity -floop-nest-optimize
          MACRO
          
          echo "Pulizia build precedente..."
          rm -rf ~/rpmbuild/BUILD/* ~/rpmbuild/RPMS/*
          
          echo "Compilazione del Kernel Ottimizzato via Fedora Spec (Cristallizzazione)..."
          export PATH="/usr/lib64/ccache:/usr/lib/ccache:$PATH"
          export CCACHE_DIR=~/.cache/ccache
          rpmbuild -bb ~/rpmbuild/SPECS/kernel.spec --target x86_64
          ccache -s
          
      - name: Publish Micro-Container OCI
        if: steps.idempotency.outputs.skip_build != 'true'
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr ~/rpmbuild/RPMS/*/*.rpm /
          
          IMAGE_LATEST=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-kernel:latest" | tr '[:upper:]' '[:lower:]')
          IMAGE_FINGERPRINT=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-kernel:${{ env.FINGERPRINT }}" | tr '[:upper:]' '[:lower:]')
          
          buildah commit $ctr $IMAGE_LATEST
          buildah tag $IMAGE_LATEST $IMAGE_FINGERPRINT
          
          buildah push $IMAGE_LATEST
          buildah push $IMAGE_FINGERPRINT


  build-nvidia:
    needs: [build-builder, build-kernel]
    name: 🎮 Build NVIDIA KMOD
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    container:
      image: ghcr.io/${{ github.repository_owner }}/ermete-builder:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Kernel Version and Install Chimera Headers
        id: kernel
        run: |
          curl -Lo /etc/yum.repos.d/fedora-nvidia.repo https://negativo17.org/repos/fedora-nvidia.repo
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
          ctr=$(buildah from ghcr.io/${{ github.repository_owner }}/ermete-forge-kernel:latest)
          buildah mount $ctr
          mnt=$(buildah mount $ctr)
          rpm -Uvh --oldpackage --replacepkgs --force $mnt/*.rpm
          buildah umount $ctr
          QUALIFIED_KERNEL=$(rpm -q --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' kernel-devel | sort -V | tail -n 1)
          echo "kernel_ver=${QUALIFIED_KERNEL}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /var/cache/akmods/nvidia/
          key: rpm-nvidia-${{ steps.kernel.outputs.kernel_ver }}
      - name: Install Dependencies and Build
        if: steps.cache.outputs['cache-hit'] != 'true'
        run: |
          dnf install -y akmods akmod-nvidia gcc gcc-c++ make elfutils-libelf-devel openssl-devel rpm-build rpmdevtools clang lld llvm
          REAL_KERNEL_VER=$(ls /usr/src/kernels/ | head -n 1)
          echo "Real kernel version is $REAL_KERNEL_VER"
          mkdir -p /lib/modules/$REAL_KERNEL_VER
          ln -sf /usr/src/kernels/$REAL_KERNEL_VER /lib/modules/$REAL_KERNEL_VER/build
          
          # Removed fake LLVM symlinks because the kernel is built natively with GCC and GCOV.          
          # No PATH export needed for gcc          
          mkdir -p /etc/pki/akmods/certs /etc/pki/akmods/private
          echo "${{ secrets.MOK_PRIVATE_KEY }}" | base64 -d > /etc/pki/akmods/private/private_key.priv
          echo "${{ secrets.MOK_PUBLIC_DER }}" | base64 -d > /etc/pki/akmods/certs/public_key.der
          cp config/rpmmacros ~/.rpmmacros
          chmod 0644 /etc/pki/akmods/private/private_key.priv

          # [GCC 15 WORKAROUND] NVIDIA 610.43 causes warnings that GCC 15 treats as errors.
          export IGNORE_CC_MISMATCH=1
          export KCFLAGS="-Wno-error"
          export CFLAGS="-Wno-error"

          akmods --force --kernels $REAL_KERNEL_VER || true
          
          # [BEDROCK CHECK] Se l'RPM non esiste, facciamo fallire esplicitamente lo step 
          # per evitare che GitHub Actions salvi una cache vuota "corrotta".
          ls /var/cache/akmods/nvidia/*.rpm || { 
            echo "ERRORE CRITICO: RPM NVIDIA non generato! Pulisco la directory per invalidare la cache."; 
            rm -rf /var/cache/akmods/nvidia/*; 
            exit 1; 
          }
      - name: Publish Micro-Container OCI
        if: steps.cache.outputs['cache-hit'] != 'true'
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /var/cache/akmods/nvidia/*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-nvidia:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER


  upstream-core:
    needs: build-builder
    name: 📦 Upstream Core

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ["brightnessctl", "btrfs-progs", "dbus-tools", "dbus-x11", "distribution-gpg-keys", "drm_info", "file-roller", "firewalld", "fuse", "fwupd", "gnome-keyring", "gnome-keyring-pam", "greenboot", "greenboot-default-health-checks", "gvfs", "libnotify", "libxcrypt-compat", "lm_sensors", "mokutil", "nftables", "openssl", "qemu-kvm", "sbsigntools", "squashfuse", "sysstat", "upower", "virt-manager"]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      FEDORA_VERSION: 43
    container:
      image: ghcr.io/${{ github.repository_owner }}/ermete-builder:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('config/rpmmacros') }}" >> $GITHUB_OUTPUT
        

      - name: Check Idempotency (Content Hash)
        id: check_idempotency
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/check_idempotency.sh --package ${{ matrix.package }} --registry ${{ env.REGISTRY }} --owner ${{ github.repository_owner }} --image-name ermete-forge-rolling-${{ matrix.package }} > idemp.out
          source ./idemp.out
          if [ "$CACHE_HIT" = "true" ]; then
            echo "cache_hit=true" >> $GITHUB_OUTPUT
          else
            echo "cache_hit=false" >> $GITHUB_OUTPUT
          fi
          echo "content_hash=$CONTENT_HASH" >> $GITHUB_OUTPUT
          
      - name: Fetch, Patch and Build ${{ matrix.package }}
        if: steps.check_idempotency.outputs.cache_hit != 'true'
        run: |
          sed -i "/tsflags=nodocs/d" /etc/dnf/dnf.conf
          dnf install -y rpm-build dnf-plugins-core rpmdevtools mold gcc-c++ which autoconf automake libtool
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          cd ~/rpmbuild/SRPMS
          
          echo "--- Downloading Source RPM per ${{ matrix.package }} ---"
          dnf download --source ${{ matrix.package }} || dnf download --source --disablerepo="rpmfusion*" ${{ matrix.package }}
          
          echo "--- Estrazione SRPM per applicare Ponytail Ultra ---"
          rpm -ivh *.src.rpm
          
          echo "--- Risoluzione Dipendenze Estrema (su SPEC) ---"
          dnf builddep -y ~/rpmbuild/SPECS/*.spec
          
          echo "--- Iniezione Dinamica Ponytail Ultra ---"
          for spec in ~/rpmbuild/SPECS/*.spec; do
            # Disattiva pacchetti di debug globalmente
            if ! grep -q "debug_package %nil" "$spec"; then
              awk '/^Name:/ { print "%global debug_package %nil"; print $0; next } 1' "$spec" > "$spec.tmp" && mv "$spec.tmp" "$spec"
            fi
          done
          
          echo "--- Ricompilazione estrema con macro Ermete e Ponytail ---"
          if ! rpmbuild -bb --nocheck ~/rpmbuild/SPECS/*.spec; then
