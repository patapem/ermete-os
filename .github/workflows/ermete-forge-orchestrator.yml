  build-repo:
    name: 📦 Build Repository
    if: always() && !cancelled()
    needs: [custom-packages, ags-ecosystem, cachyos-addons, build-kernel, build-nvidia, upstream-core, upstream-desktop, upstream-media, upstream-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: ghcr.io/${{ github.repository_owner }}/ermete-builder:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Create Repo and Push OCI
        run: |
          dnf install -y createrepo_c buildah skopeo
          
          # Fetch RPMs dynamically from micro-containers
          echo "${{ secrets.GITHUB_TOKEN }}" | buildah login ghcr.io -u ${{ github.actor }} --password-stdin
          bash scripts/fetch_repo_rpms.sh ${{ github.repository_owner }}
          
          cd /github/home/repo
          createrepo_c .
          
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/repo /
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository_owner }}/ermete-forge-repo:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER

