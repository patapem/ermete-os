          buildah copy $ctr /github/home/RPMS/appmenu-glib-translator*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-appmenu-glib-translator:latest" | tr '[:upper:]' '[:lower:]')
