      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-bibata/**', 'config/rpmmacros') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-bibata-${{ steps.hash.outputs.hash }}
      - name: Cache Cargo Registry
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /root/.cargo/registry
          key: cargo-registry-bibata-${{ steps.hash.outputs.hash }}
          restore-keys: cargo-registry-bibata-
      - name: Install Dependencies and Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y rpm-build rpmdevtools tar xz curl
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          spectool -g -R specs/ermete-bibata/ermete-bibata.spec
          dnf builddep -y specs/ermete-bibata/ermete-bibata.spec
          rpmbuild -bb --nocheck specs/ermete-bibata/ermete-bibata.spec
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/rpmbuild/RPMS/*/*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-bibata:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER
