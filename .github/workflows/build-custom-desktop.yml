            rpmbuild -bb --nocheck specs/ermete-astal/aylurs-gtk-shell/*.spec
          else
            echo "Warning: specs/ermete-astal/aylurs-gtk-shell not found, skipping build"
            mkdir -p /github/home/RPMS
            exit 0
          fi
          mkdir -p /github/home/RPMS
          cp ~/rpmbuild/RPMS/*/*.rpm /github/home/RPMS/
      - name: Upload RPMs
