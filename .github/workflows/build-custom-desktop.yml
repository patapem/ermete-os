    name: 🖥️ Build AGS (astal-io)
    runs-on: self-hosted
    needs: build-appmenu-glib-translator
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Download Previous RPMs
        uses: actions/download-artifact@v4
        with:
          path: /github/home/PREV_RPMS/
          pattern: rpm-ags-*
          merge-multiple: true
      - name: Install Dependencies and Build
        run: |
          dnf install -y rpm-build rpmdevtools meson ninja-build gcc gcc-c++ vala pkgconf-pkg-config
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          find /github/home/PREV_RPMS/ -type f -name "*.rpm" | xargs -r dnf install -y
          if [ -d "specs/ermete-astal/astal-io" ]; then
