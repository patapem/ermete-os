name: Ermete Custom Desktop

on:
  push:
    branches: [ main ]
    paths:
      - 'specs/ermete-astal/**'
      - 'specs/ermete-matugen/**'
      - 'specs/ermete-bibata/**'
      - '.github/workflows/build-custom-desktop.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  REGISTRY: ghcr.io
  FEDORA_VERSION: 43

jobs:
  build-appmenu-glib-translator:
    name: 🖥️ Build AGS (appmenu-glib-translator)
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies and Build
        run: |
          dnf install -y rpm-build rpmdevtools meson ninja-build gcc gcc-c++ vala pkgconf-pkg-config
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          if [ -d "specs/ermete-astal/appmenu-glib-translator" ]; then
            spectool -g -R specs/ermete-astal/appmenu-glib-translator/*.spec
            dnf builddep -y specs/ermete-astal/appmenu-glib-translator/*.spec
            rpmbuild -bb --nocheck specs/ermete-astal/appmenu-glib-translator/*.spec
          else
            echo "Error: specs/ermete-astal/appmenu-glib-translator not found"
            exit 1
          fi
          mkdir -p /github/home/RPMS
          cp ~/rpmbuild/RPMS/*/*.rpm /github/home/RPMS/
      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: rpm-ags-appmenu-glib-translator
          path: /github/home/RPMS/*.rpm
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/RPMS/appmenu-glib-translator*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/ermete-forge-appmenu-glib-translator:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER
