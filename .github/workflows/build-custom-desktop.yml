name: Ermete Custom Desktop

on:
  push:
    branches: [ main ]
    paths:
      - 'specs/ermete-astal/**'
      - 'specs/ermete-matugen/**'
      - 'specs/ermete-bibata/**'
      - '.github/workflows/build-custom-desktop.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  REGISTRY: ghcr.io
  FEDORA_VERSION: 43

jobs:
  build-ags:
    name: 🖥️ Build AGS (Astal Extreme)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-astal/**', 'config/rpmmacros') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/RPMS/
          key: rpm-ags-${{ steps.hash.outputs.hash }}
      - name: Install Dependencies and Build Astal
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y rpm-build rpmdevtools meson ninja-build gcc gcc-c++ vala pkgconf-pkg-config
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          
          # Ordine di dipendenza critico per l'ecosistema Astal (AGS v3)
          ASTAL_PKGS="appmenu-glib-translator astal-io astal astal-libs astal-gjs astal-gtk4 astal-lua aylurs-gtk-shell2"
          
          for pkg in $ASTAL_PKGS; do
            echo "--- Compiling $pkg ---"
            if [ -d "specs/ermete-astal/$pkg" ]; then
              spectool -g -R specs/ermete-astal/$pkg/*.spec
              dnf builddep -y specs/ermete-astal/$pkg/*.spec
              rpmbuild -bb --nocheck specs/ermete-astal/$pkg/*.spec
              # Installa subito l'RPM buildato perché il pacchetto successivo ne ha bisogno
              find ~/rpmbuild/RPMS/ -type f -name "*.rpm" | xargs -r dnf install -y
            else
              echo "Error: specs/ermete-astal/$pkg not found"
              exit 1
            fi
          done
          
          mkdir -p /github/home/RPMS
          cp ~/rpmbuild/RPMS/*/*.rpm /github/home/RPMS/
      - name: Publish Micro-Container OCI (Separazione Rigorosa)
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          
          # Ordine di dipendenza critico per l'ecosistema Astal (AGS v3)
          ASTAL_PKGS="appmenu-glib-translator astal-io astal astal-libs astal-gjs astal-gtk4 astal-lua aylurs-gtk-shell2"
          
          for pkg in $ASTAL_PKGS; do
            echo "--- Creazione Micro-Container Isolato per $pkg ---"
            ctr=$(buildah from scratch)
            
            # Copiamo solo gli RPM del pacchetto specifico (se aylurs-gtk-shell2 crea aylurs-gtk-shell, usiamo un glob esteso)
            if [[ "$pkg" == "aylurs-gtk-shell2" ]]; then
                buildah copy $ctr /github/home/RPMS/aylurs-gtk-shell*.rpm / || true
            else
                buildah copy $ctr /github/home/RPMS/${pkg}*.rpm / || true
            fi
            
            IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/${pkg}:latest" | tr '[:upper:]' '[:lower:]')
            # Correggo il target name per aylurs-gtk-shell per allinearlo alla direttiva del Containerfile
            if [[ "$pkg" == "aylurs-gtk-shell2" ]]; then
                IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/aylurs-gtk-shell:latest" | tr '[:upper:]' '[:lower:]')
            fi
            
            buildah commit $ctr $IMAGE_LOWER
            buildah push $IMAGE_LOWER
            
            # Il Containerfile richiede anche esplicitamente 'aylurs-gtk-shell2:latest'. Duplichiamo il tag.
            if [[ "$pkg" == "aylurs-gtk-shell2" ]]; then
                IMAGE_LOWER2=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/aylurs-gtk-shell2:latest" | tr '[:upper:]' '[:lower:]')
                buildah commit $ctr $IMAGE_LOWER2
                buildah push $IMAGE_LOWER2
            fi
          done
  build-matugen:
    name: 🎨 Build Matugen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-matugen/**', 'config/rpmmacros') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-matugen-${{ steps.hash.outputs.hash }}
      - name: Cache Cargo Registry
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /root/.cargo/registry
          key: cargo-registry-matugen-${{ steps.hash.outputs.hash }}
          restore-keys: cargo-registry-matugen-
      - name: Install Dependencies and Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y rpm-build rpmdevtools gcc gcc-c++ cargo rust cmake mold tar xz curl pkgconf-pkg-config zlib-devel openssl-devel
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          spectool -g -R specs/ermete-matugen/ermete-matugen.spec
          dnf builddep -y specs/ermete-matugen/ermete-matugen.spec
          rpmbuild -bb --nocheck specs/ermete-matugen/ermete-matugen.spec
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/rpmbuild/RPMS/*/*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/ermete-matugen:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER
  build-bibata:
    name: 🖱️ Build Bibata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    container:
      image: registry.fedoraproject.org/fedora:43
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Calculate Hash
        id: hash
        run: echo "hash=${{ hashFiles('specs/ermete-bibata/**', 'config/rpmmacros') }}" >> $GITHUB_OUTPUT
      - name: Cache RPMs
        id: cache
        uses: actions/cache@v4
        with:
          path: /github/home/rpmbuild/RPMS/
          key: rpm-bibata-${{ steps.hash.outputs.hash }}
      - name: Cache Cargo Registry
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /root/.cargo/registry
          key: cargo-registry-bibata-${{ steps.hash.outputs.hash }}
          restore-keys: cargo-registry-bibata-
      - name: Install Dependencies and Build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          dnf install -y rpm-build rpmdevtools tar xz curl
          cp config/rpmmacros ~/.rpmmacros
          rpmdev-setuptree
          spectool -g -R specs/ermete-bibata/ermete-bibata.spec
          dnf builddep -y specs/ermete-bibata/ermete-bibata.spec
          rpmbuild -bb --nocheck specs/ermete-bibata/ermete-bibata.spec
      - name: Publish Micro-Container OCI
        run: |
          dnf install -y buildah
          export STORAGE_DRIVER=vfs
          export BUILDAH_ISOLATION=chroot
          buildah login -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }} ${{ env.REGISTRY }}
          ctr=$(buildah from scratch)
          buildah copy $ctr /github/home/rpmbuild/RPMS/*/*.rpm /
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ github.repository }}/ermete-bibata:latest" | tr '[:upper:]' '[:lower:]')
          buildah commit $ctr $IMAGE_LOWER
          buildah push $IMAGE_LOWER
