name: Build and Package Morros OS

on:
  push:
    branches: [ "main", "master" ] # Modifica se il tuo branch principale si chiama diversamente
  workflow_dispatch: # Ti permette di avviare la build manualmente da GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-architecture support if needed)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }} / ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Bootc Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-iso:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p ./output

      - name: Build ISO via bootc-image-builder
        # Usiamo sudo perché l'esecutore di bootc-image-builder richiede privilegi di root per isolare i container di loopback
        run: |
          sudo docker run \
            --rm \
            --privileged \
            -v /dev:/dev \
            -v ./output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            ghcr.io/${{ github.repository }}:latest

      - name: Upload ISO Artifact
        uses: actions/actions-artifact@v4
        with:
          name: morros-fedora-iso
          path: ./output/bootiso/install.iso
          if-no-files-found: error
          retention-days: 7
